command-open-permission: amenu.open

chat-input:
  timeout-seconds: 15
  global-cancel-keywords:
    - cancel
    - quit
    - stop
    - 取消

messages:
  prefix: "<gray>[<aqua><bold>AMenu</bold></aqua>]</gray> "
  only-player: "<red>只有玩家可以使用这个指令。</red>"
  no-permission: "<red>你没有权限执行这个操作。</red>"
  reloaded: "<green>已重载菜单配置。</green>"
  menu-missing: "<red>菜单 <yellow>{menu}</yellow> 不存在。</red>"
  prompt-missing: "<red>输入流程 <yellow>{prompt}</yellow> 不存在。</red>"
  prompt-replaced: "<yellow>你原有的输入流程已被新的输入请求替换。</yellow>"
  prompt-timeout: "<red>输入流程已超时，请重新打开菜单后再试一次。</red>"
