title: "AMenu Admin"

layout:
  - "#########"
  - "#G#R#T#I#"
  - "#########"

fill:
  material: GRAY_STAINED_GLASS_PANE
  name: " "

buttons:
  "G":
    permission: amenu.admin
    deny-actions:
      - "message: You need amenu.admin to receive browser-compass."
    material: COMPASS
    name: "<aqua><bold>Receive Browser</bold></aqua>"
    lore:
      - "<gray>Give yourself the browser-compass test item.</gray>"
    click:
      - "player: amenu give browser-compass"

  "R":
    permission: amenu.admin
    deny-actions:
      - "message: You need amenu.admin to reload menus."
    material: REDSTONE
    name: "<green><bold>Reload Menus</bold></green>"
    lore:
      - "<gray>Run /amenu reload and keep the inventory stable.</gray>"
    click:
      - "console: amenu reload"
      - "refresh"

  "I":
    material: BOOK
    name: "<aqua><bold>Viewer Mode</bold></aqua>"
    lore:
      - "<gray>This button will switch once your permission changes.</gray>"
      - "<dark_gray>Grant amenu.admin and wait one interval.</dark_gray>"
    states:
      admin-view:
        conditions:
          has-permission: amenu.admin
        material: EMERALD
        name: "<green><bold>Admin Mode</bold></green>"
        lore:
          - "<gray>The timed reevaluation picked up your new permission.</gray>"
          - "<dark_gray>The menu stayed open on the same surface.</dark_gray>"
    click:
      - "message: amenu.admin controls the timed state demo."

pages:
  ticker:
    symbol: "T"
    provider:
      type: placeholder-state
      params:
        viewer-name: "%player_name%"
      cache:
        ttl: 5
    update:
      interval: 20
    loading:
      material: CLOCK
      name: "<yellow><bold>Watching viewer state...</bold></yellow>"
    empty:
      material: BARRIER
      name: "<red><bold>No timed state</bold></red>"
    error:
      material: RED_STAINED_GLASS_PANE
      name: "<red><bold>Timed state failed</bold></red>"
    entries:
      watcher:
        material: CLOCK
        name: "<yellow><bold>Timed Watcher</bold></yellow>"
        lore:
          - "<gray>Viewer: %player_name%</gray>"
          - "<gray>This surface drives in-place timed reevaluation.</gray>"
        click:
          - "page: refresh ticker"
