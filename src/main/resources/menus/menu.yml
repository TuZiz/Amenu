Title: "<gradient:#58A6FF:#F778BA><bold>服务器主菜单</bold></gradient>"

Shape:
  - "`领地系统``家`BB`个人档案`BBB`便携功能`"
  - "B   `世界传送` `点券商店` B"
  - "B`等价交换` `每日任务`   `称号系统`B"
  - "B `系统商店` `随机传送`   B"
  - "B`在线奖励`     `玩家地标`B"
  - "BBBB`市场中心`BBBB"
Bindings:
  command:
    - "cd"
    - "menu"
    - "菜单"
  Item:
