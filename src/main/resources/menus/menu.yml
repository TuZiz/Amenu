    name: "<gradient:#F6D365:#FDA085><bold>✦ 领地管理 ✦</bold></gradient>"
    lore:
      - ""
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>查看已有领地或获取工具</#E0E0E0>"
      - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>保护你的私有财产</#E0E0E0>"
      - ""
      - " <#58A6FF>▶</#58A6FF> <#F778BA>点击打开面板</#F778BA>"
    click:
      - "close"
      - "delay: 1"
      - "player: claim"

  "家":
