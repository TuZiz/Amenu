Title: "<gradient:#4FACFE:#00F2FE><bold>点券充值</bold></gradient>"

Layout:
  - "#########"
  - "###a#b###"
  - "#########"

BUTTONS:
  "#":
    display:
      material: BLACK_STAINED_GLASS_PANE
      name: " "

  "a":
    display:
      material: EMERALD_BLOCK
      name: "<gradient:#43E97B:#38F9D7><bold>✦ 微信支付 ✦</bold></gradient>"
      lore:
        - ""
        - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>使用微信扫码进行充值</#E0E0E0>"
        - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>安全快捷，自动到账</#E0E0E0>"
        - ""
        - " <#43E97B>▶</#43E97B> <#38F9D7>点击唤起金额输入</#38F9D7>"
    actions:
      all:
        - "close"
    input:
      type: CHAT
      timeout-seconds: 30
      start:
        - "<gradient:#43E97B:#38F9D7><bold>▶</bold></gradient> <green>请在聊天栏输入您要充值的金额（输入 cancel 取消）。</green>"
        - "<gray>支持整数</gray>"
      validation:
        matches: "[1-9]\\d*"
      invalid:
        - "tell: <red>✘ 格式错误！请输入有效的数字金额。</red>"
        - "menu: pay"
      cancel:
        - "tell: <yellow>⚠ 您没有输入金额，已取消充值操作。</yellow>"
        - "menu: pay"
      submit:
        - "tell: <gradient:#43E97B:#38F9D7><bold>▶</bold></gradient> <green>正在生成微信订单，请支付与输入金额对应的数目！</green>"
        - "command: cz points wechat {input}"

  "b":
    display:
      material: DIAMOND_BLOCK
      name: "<gradient:#00C6FB:#005BEA><bold>✦ 支付宝支付 ✦</bold></gradient>"
      lore:
        - ""
        - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>使用支付宝扫码进行充值</#E0E0E0>"
        - " <#A9A9A9>▪</#A9A9A9> <#E0E0E0>安全快捷，自动到账</#E0E0E0>"
        - ""
        - " <#00C6FB>▶</#00C6FB> <#005BEA>点击唤起金额输入</#005BEA>"
    actions:
      all:
        - "close"
    input:
      type: CHAT
      timeout-seconds: 30
      start:
        - "<gradient:#00C6FB:#005BEA><bold>▶</bold></gradient> <aqua>请在聊天栏输入您要充值的金额（输入 cancel 取消）。</aqua>"
        - "<gray>支持整数</gray>"
      validation:
        matches: "[1-9]\\d*"
      invalid:
        - "tell: <red>✘ 格式错误！请输入有效的数字金额。</red>"
        - "menu: pay"
      cancel:
        - "tell: <yellow>⚠ 您没有输入金额，已取消充值操作。</yellow>"
        - "menu: pay"
      submit:
        - "tell: <gradient:#00C6FB:#005BEA><bold>▶</bold></gradient> <aqua>正在生成支付宝订单，请支付与输入金额对应的数目！</aqua>"
        - "command: cz points alipay {input}"