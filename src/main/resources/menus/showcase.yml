title: "AMenu Showcase"

layout:
  - "#########"
  - "H#RBAT#M#"
  - "#########"

bindings:
  browser-compass:
    type: ITEM
    material: COMPASS
    name: "<aqua><bold>AMenu Browser</bold></aqua>"
    actions:
      - RIGHT_CLICK_AIR
      - RIGHT_CLICK_BLOCK
    placeholders:
      binding-source: showcase-binding

fill:
  material: LIGHT_BLUE_STAINED_GLASS_PANE
  name: " "

buttons:
  "H":
    material: BOOKSHELF
    name: "<light_purple><bold>Open History</bold></light_purple>"
    lore:
      - "<gray>Provider surfaces, loading states, and targeted refresh.</gray>"
    click:
      - "menu: history"

  "R":
    material: NETHER_STAR
    name: "<green><bold>Runtime Lab</bold></green>"
    lore:
      - "<gray>Chat prompt and action-chain showcase.</gray>"
    click:
      - "menu: runtime"

  "B":
    material: COMPASS
    name: "<aqua><bold>Binding Feedback</bold></aqua>"
    lore:
      - "<gray>Visible only when the menu was opened from the browser item.</gray>"
      - "<dark_gray>{binding-id} / {binding-action}</dark_gray>"
    conditions:
      placeholder-equals:
        binding-type: item
    click:
      - "message: bound-{binding-id}-{binding-action}"

  "A":
    material: REDSTONE
    name: "<red><bold>Admin Demo</bold></red>"
    lore:
      - "<gray>Timed permission state switching and reload feedback.</gray>"
    click:
      - "menu: admin"

  "M":
    material: BARRIER
    name: "<red><bold>Back To Menu</bold></red>"
    lore:
      - "<gray>Return to the bundled main menu.</gray>"
    click:
      - "menu: menu"

pages:
  live:
    symbol: "T"
    provider:
      type: placeholder-state
      params:
        viewer-name: "%player_name%"
        reward-state: "available"
      cache:
        ttl: 20
    update:
      interval: 20
    loading:
      material: CLOCK
      name: "<yellow><bold>Refreshing viewer card...</bold></yellow>"
      lore:
        - "<gray>Waiting for the provider to resolve the latest viewer state.</gray>"
    empty:
      material: BARRIER
      name: "<red><bold>No live state</bold></red>"
    error:
      material: RED_STAINED_GLASS_PANE
      name: "<red><bold>Viewer state failed</bold></red>"
    entries:
      live-card:
        material: PAPER
        name: "<aqua><bold>Viewer %player_name%</bold></aqua>"
        lore:
          - "<gray>This card proves PlaceholderAPI can be bridged safely.</gray>"
          - "<gray>Use the refresh entrypoint to invalidate just this surface.</gray>"
        click:
          - "page: refresh live"
