name: AMenu
version: ${project.version}
main: cc.keer.amenu.AMenuPlugin
api-version: "1.20"
folia-supported: true
author: Keer
description: 一个更现代、低配置的 Minecraft 菜单插件，兼容 Spigot、Paper 与 Folia。
softdepend: [PlaceholderAPI, PlayerPoints]

commands:
  amenu:
    description: 打开或管理 AMenu。
    usage: /amenu [reload|open <menuId>|give <bindingId>]
    aliases: [skinmenu, menu]

permissions:
  amenu.admin:
    description: 重载 AMenu 并执行高级管理操作。
    default: op
