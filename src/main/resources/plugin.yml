name: AMenu
version: ${project.version}
main: cc.keer.amenu.AMenuPlugin
api-version: "1.20"
folia-supported: true
author: Keer
description: A general, low-config Minecraft menu plugin for Spigot, Paper, and Folia-aware execution.

commands:
  amenu:
    description: Open or manage AMenu.
    usage: /amenu [reload|open <menuId>]
    aliases: [skinmenu]

permissions:
  amenu.admin:
    description: Reload AMenu and manage advanced operations.
    default: op
