title: "<gradient:#F6D365:#FDA085><bold>功能展示 - 动作执行</bold></gradient>"

Shape:
  - "#########"
  - "##`飞行权限`#`随身工作台`#`末影箱权限`##"
  - "##`随身铁砧`#`随身切石机`#`随身砂轮`##"
  - "#########"
  - "#########"
  - "####`返回点券商店`####"

BUTTONS:
  "#":
    material: BLACK_STAINED_GLASS_PANE
    name: " "

  "飞行权限":
    material: FEATHER
    shiny: true
    name: "<gradient:#00C9FF:#92FE9D><bold>飞行权限</bold></gradient>"
    lore:
      - " <#4A4A4A>▪ ┈┈┈┈┈┈┈┈┈┈┈┈ ▪</#4A4A4A>"
      - ""
      - "  <#E0E0E0>解放重力束缚，在生存世界中自由探索。</#E0E0E0>"
      - ""
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>动作:</#CCCCCC> <#8FD3F4>条件购买 + 扣点 + 授权 + 反馈</#8FD3F4>"
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>价格:</#CCCCCC> <color:#FFD700>380 星辰</color>"
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>余额:</#CCCCCC> <color:#00FF7F>%playerpoints_points%</color>"
      - ""
      - " <#84FAB0>➭</#84FAB0> <#8FD3F4>左键点击 支付并激活</#8FD3F4>"
    click:
      - condition: "check papi *%playerpoints_points% >= *380"
        actions:
          - "take-point: 380"
          - "console: lp user %player_name% permission set cmi.command.fly true"
          - "sound: ENTITY_ENDER_DRAGON_FLAP:1:1"
          - "title: &a&l权限激活||&7购买成功,尽情翱翔吧"
          - "tell: &8[&b权限&8] &a飞行权限购买成功！可输入 &f/fly &a使用。"
          - "close"
        deny:
          - "sound: BLOCK_ANVIL_DESTROY:1:2"
          - "title: &c&l购买失败||&7您的星辰余额不足"
          - "tell: &8[&c提示&8] &c需要 &d380 星辰&c，您当前仅有 &f%playerpoints_points% 星辰&c。"
    icons:
      - condition: "perm *cmi.command.fly"
        material: FEATHER
        shiny: true
        name: "<gradient:#43E97B:#38F9D7><bold>飞行功能 | 已激活</bold></gradient>"
        lore:
          - " <#4A4A4A>▪ ┈┈┈┈┈┈┈┈┈┈┈┈ ▪</#4A4A4A>"
          - ""
          - "  <#E0E0E0>您已拥有该特权，可直接执行后续动作。</#E0E0E0>"
          - "  <#F6D365>❖</#F6D365> <#CCCCCC>关联指令:</#CCCCCC> <#8FD3F4>/fly</#8FD3F4>"
          - "  <#43E97B>✔</#43E97B> <#38F9D7>状态: 已永久解锁</#38F9D7>"
          - ""
          - " <#43E97B>➭</#43E97B> <#38F9D7>左键点击 切换飞行状态</#38F9D7>"
        click:
          - "close"
          - "delay: 1"
          - "player: fly"

  "随身工作台":
    material: CRAFTING_TABLE
    name: "<gradient:#A1C4FD:#C2E9FB><bold>便捷工作台</bold></gradient>"
    lore:
      - " <#4A4A4A>▪ ┈┈┈┈┈┈┈┈┈┈┈┈ ▪</#4A4A4A>"
      - ""
      - "  <#E0E0E0>随时随地打开工作台界面。</#E0E0E0>"
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>解锁:</#CCCCCC> <#C2E9FB>/wb</#C2E9FB>"
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>价格:</#CCCCCC> <color:#FFD700>100 星辰</color>"
      - "  <#F6D365>❖</#F6D365> <#CCCCCC>余额:</#CCCCCC> <color:#00FF7F>%playerpoints_points%</color>"
      - ""
      - " <#A1C4FD>➭</#A1C4FD> <#C2E9FB>左键点击 支付并激活</#C2E9FB>"
    click:
      - condition: "check papi *%playerpoints_points% >= *100"
        actions:
          - "take-point: 100"
          - "console: lp user %player_name% permission set cmi.command.workbench true"
          - "sound: ENTITY_PLAYER_LEVELUP:1:1.2"
          - "title: &a&l权限激活||&7随身工作台已解锁"
          - "tell: &8[&e功能&8] &a随身工作台购买成功！输入 &f/wb &a即可使用。"
          - "close"
        deny:
          - "sound: BLOCK_ANVIL_DESTROY:1:2"
          - "title: &c&l购买失败||&7您的星辰余额不足"
          - "tell: &8[&c提示&8] &c需要 &d100 星辰&c，您当前仅有 &f%playerpoints_points% 星辰&c。"
    icons:
      - condition: "perm *cmi.command.workbench"
        material: CRAFTING_TABLE
        shiny: true
        name: "<gradient:#43E97B:#38F9D7><bold>便捷工作台 | 已激活</bold></gradient>"
        lore:
          - "  <#E0E0E0>已解锁该功能，外出探险时可直接打开。</#E0E0E0>"
          - "  <#F6D365>❖</#F6D365> <#CCCCCC>关联指令:</#CCCCCC> <#8FD3F4>/wb</#8FD3F4>"
        click:
          - "close"
          - "delay: 1"
          - "player: wb"

